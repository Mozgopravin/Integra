<!DOCTYPE html>

    <link rel="icon" href="images/favicon.ico" type="image/x-icon">

    <title>INTEGRA team</title>
    
    <style>
        /* Подключаем шрифт Fatal (TRIAL) Bold */
        @font-face {
            font-family: 'Fatal Trial';  /* Имя шрифта */
            src: url('fonts/Fatal-TRIAL-Bold.woff2') format('woff2'),  /* Шрифт в формате woff2 */
                 url('fonts/Fatal-TRIAL-Bold.woff') format('woff'),  /* Шрифт в формате woff */
                 url('fonts/Fatal-TRIAL-Bold.ttf') format('truetype'); /* Шрифт в формате ttf */
            font-weight: bold;  /* Указываем, что это жирный шрифт */
            font-style: normal;  /* Устанавливаем стиль нормальный */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fatal Trial', Arial, sans-serif;  /* Используем жирный шрифт Fatal Trial */
            height: 100vh;
            overflow: hidden;
        }

        /* Стили для начальной страницы */
        #entry-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        /* Скрытие экрана входа */
        #entry-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Стили для основной страницы */
        #main-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
            transition: opacity 1s ease;
        }

        #main-screen.visible {
            display: flex;
            opacity: 1;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
        }

        .animated-text {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 20px;  /* отступ для текста */
        }

        h2 {
            font-size: 2rem;
            margin: 0;
            font-weight: bold;
        }

        .since-text {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: rgba(215, 215, 215, 0.5);
            transition: color 0.3s ease;
        }

        .since-text:hover {
            color: white;
        }
    </style>
</head>
