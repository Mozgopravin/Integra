<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Animation Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            font-size: 3rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
        }

        .text {
            overflow: hidden;
            width: 0;
            border-right: 4px solid white;
            white-space: nowrap;
            animation: typing 5s steps(40) 1s forwards, erase 3s steps(40) 6s 1 forwards, blink 0.75s step-end infinite;
        }

        /* Анимация набора текста */
        @keyframes typing {
            0% {
                width: 0;
            }
            100% {
                width: 100%;
            }
        }

        /* Анимация стирания текста */
        @keyframes erase {
            0% {
                width: 100%;
            }
            100% {
                width: 0;
            }
        }

        /* Бликинг курсора */
        @keyframes blink {
            0%, 50% {
                border-color: transparent;
            }
            50% {
                border-color: white;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text" id="text">INTEGRA team</div>
    </div>

    <script>
        const texts = ["INTEGRA team", "Mozgopravin was here"];  // Массив текстов
        let currentTextIndex = 0;

        function changeText() {
            const textElement = document.getElementById('text');

            setInterval(() => {
                textElement.style.animation = 'none';  // Сброс анимации
                textElement.offsetHeight;  // Принудительный пересчет DOM
                textElement.style.animation = '';  // Повторное присваивание анимации

                textElement.innerText = texts[currentTextIndex];
                currentTextIndex = (currentTextIndex + 1) % texts.length;  // Переключение текста
            }, 8000);  // Переключаем текст каждые 8 секунд
        }

        changeText();  // Запуск анимации
    </script>
</body>
</html>
