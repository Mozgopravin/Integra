    <style>
        /* Подключаем шрифт Fatal (TRIAL) Bold */
        @font-face {
            font-family: 'Fatal Trial';  
            src: url('fonts/Fatal-TRIAL-Bold.woff2') format('woff2'),  
                 url('fonts/Fatal-TRIAL-Bold.woff') format('woff'),  
                 url('fonts/Fatal-TRIAL-Bold.ttf') format('truetype'); 
            font-weight: bold;  
            font-style: normal;  
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fatal Trial', Arial, sans-serif;  
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
        }

        .animated-text {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 20px;  
        }

        h2 {
            font-size: 2rem;
            margin: 0;
            font-weight: bold;
        }

        .since-text {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: rgba(215, 215, 215, 0.5);
            transition: color 0.3s ease;
        }

        .since-text:hover {
            color: white;
        }

        /* Стили для стартового экрана */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-screen .enter-text {
            font-family: 'Fatal Trial', Arial, sans-serif;
            font-size: 3rem;
            cursor: pointer;
            display: inline-block;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        #start-screen .enter-text:hover {
            color: #f0f0f0;
            transform: scale(1.1);
        }

        #start-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in-out;
        }

        #main-screen {
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #main-screen.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    </div>
