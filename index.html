<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEGRA team</title>
    
    <style>
        /* Подключаем шрифт Fatal (TRIAL) Bold */
        @font-face {
            font-family: 'Fatal Trial';  /* Имя шрифта */
            src: url('fonts/Fatal-TRIAL-Bold.woff2') format('woff2'),  /* Шрифт в формате woff2 */
                 url('fonts/Fatal-TRIAL-Bold.woff') format('woff'),  /* Шрифт в формате woff */
                 url('fonts/Fatal-TRIAL-Bold.ttf') format('truetype'); /* Шрифт в формате ttf */
            font-weight: bold;  /* Указываем, что это жирный шрифт */
            font-style: normal;  /* Устанавливаем стиль нормальный */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fatal Trial', Arial, sans-serif;  /* Используем жирный шрифт Fatal Trial */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
        }

        h2 {
            font-size: 6rem;
            margin: 0;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            width: 0;
            animation: typing 5s steps(20) 1s forwards, erase 5s steps(20) 6s 1 forwards;
        }

        @keyframes typing {
            0% {
                width: 0;
            }
            20% {
                width: 100%;
            }
            100% {
                width: 100%;
            }
        }

        @keyframes erase {
            0% {
                width: 100%;
            }
            20% {
                width: 100%;
            }
            40% {
                width: 0;
            }
            60% {
                width: 0;
            }
            100% {
                width: 0;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Добро пожаловать</h1>
        <h2 id="text">INTEGRA team</h2>
    </div>

    <script>
        // Функция для смены текста с анимацией
        function changeText() {
            const textElement = document.getElementById('text');
            const texts = ["INTEGRA team", "Mozgopravin was here"];
            let currentTextIndex = 0;

            setInterval(() => {
                // Стираем текущий текст
                textElement.style.width = '0';  // Начинаем стирание текста
                setTimeout(() => {
                    // Меняем текст после стирания
                    currentTextIndex = (currentTextIndex + 1) % texts.length;
                    textElement.innerText = texts[currentTextIndex];
                    textElement.style.width = '100%';  // Начинаем новый набор текста
                }, 500);  // Задержка перед сменой текста
            }, 10000);  // Цикл каждые 10 секунд
        }

        // Запуск функции смены текста
        changeText();
    </script>
</body>
</html>
