<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEGRA team</title>
    
    <style>
        /* Подключаем шрифт Fatal (TRIAL) Bold */
        @font-face {
            font-family: 'Fatal Trial';
            src: url('fonts/Fatal-TRIAL-Bold.woff2') format('woff2'),
                 url('fonts/Fatal-TRIAL-Bold.woff') format('woff'),
                 url('fonts/Fatal-TRIAL-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fatal Trial', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
        }

        .enter-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .enter-text {
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.3s ease;
        }

        .enter-text:hover {
            color: white;
        }

        .main-screen {
            display: none; /* Главная страница скрыта изначально */
        }

        h1 {
            font-size: 6rem;
            margin: 0;
        }

        .animated-text {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 20px;
        }

        h2 {
            font-size: 2rem;
            margin: 0;
            font-weight: bold;
        }

        .since-text {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: rgba(215, 215, 215, 0.5);
            transition: color 0.3s ease;
        }

        .since-text:hover {
            color: white;
        }
    </style>
</head>
<body>
    <!-- Стартовая страница -->
    <div class="enter-screen" id="enterScreen">
        <div class="enter-text" id="enterText">Click to enter</div>
    </div>

    <!-- Главная страница -->
    <div class="main-screen" id="mainScreen">
        <div>
            <h1>Добро пожаловать!</h1>
            <div class="animated-text" id="text"></div>
            <h2></h2>
            <div class="since-text">since 2022</div>
        </div>
    </div>

    <script>
        // Ссылки на элементы
        const enterScreen = document.getElementById("enterScreen");
        const mainScreen = document.getElementById("mainScreen");
        const enterText = document.getElementById("enterText");
        const textElement = document.getElementById("text");

        // Анимация текста на главной странице
        const textStages = [
            ["I"], ["In"], ["Int"], ["Inte"], ["Integ"], ["Integr"], ["Integra"], ["Integra t"],
            ["Integra te"], ["Integra tea"], ["Integra team"], ["Integra team"], ["Integra tea"], ["Integra te"],
            ["Integra t"], ["Integra"], ["Integr"], ["Integ"], ["Inte"], ["Int"], ["In"], ["I"],
        ];

        let i = 0;

        function changeText() {
            textElement.textContent = textStages[i];
            i = (i + 1) % textStages.length;
        }

        // Обновляем текст на главной странице каждые 100 мс
        setInterval(changeText, 100);

        // Воспроизведение музыки
        const audio = new Audio("https://track.pinkamuz.pro/download/333331b0b03436b2308c3731353332b63430310100/6ea3f09672910145b4559df195d8cd98/%C3%98fdream%20-%20Thelema%20%28slow%20reverb%29.mp3");
        audio.loop = true;

        // Переход на главную страницу при клике
        enterText.addEventListener("click", () => {
            audio.play().catch(error => console.error("Ошибка воспроизведения музыки:", error));
            enterScreen.style.display = "none"; // Скрыть стартовую страницу
            mainScreen.style.display = "flex"; // Показать главную страницу
        });
    </script>
</body>
</html>
