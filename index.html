<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEGRA team</title>
    
    <style>
        /* Подключаем шрифт Fatal Trial */
        @font-face {
            font-family: 'Fatal Trial';
            src: url('fonts/FatalTrial-Regular.woff2') format('woff2'),
                 url('fonts/FatalTrial-Regular.woff') format('woff'),
                 url('fonts/FatalTrial-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fatal Trial', Arial, sans-serif;  /* Используем шрифт Fatal Trial */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
        }

        h2 {
            font-size: 5rem;
            margin: 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div>
        <h1>Добро пожаловать</h1>
        <h2>INTEGRA team</h2>
    </div>
</body>
</html>
