<html lang="ru">
<head>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">

    <title>INTEGRA team</title>
    
    <style>
        /* Подключаем шрифт Fatal (TRIAL) Bold */
        @font-face {
            font-family: 'Fatal Trial';  /* Имя шрифта */
            src: url('fonts/Fatal-TRIAL-Bold.woff2') format('woff2'),  /* Шрифт в формате woff2 */
                 url('fonts/Fatal-TRIAL-Bold.woff') format('woff'),  /* Шрифт в формате woff */
                 url('fonts/Fatal-TRIAL-Bold.ttf') format('truetype'); /* Шрифт в формате ttf */
            font-weight: bold;  /* Указываем, что это жирный шрифт */
            font-style: normal;  /* Устанавливаем стиль нормальный */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fatal Trial', Arial, sans-serif;  /* Используем жирный шрифт Fatal Trial */
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
        }

        /* Стили для окна "Click to Enter" */
        #entry-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 1); /* Тёмный фон с прозрачностью */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        /* Скрытие окна входа */
        #entry-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Основная страница */
        #main-content {
            position: relative;
            z-index: 1; /* Слой ниже окна входа */
            opacity: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1 {
            font-size: 6rem;
            margin: 0;
        }

        .animated-text {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 20px;
        }

        h2 {
            font-size: 2rem;
            margin: 0;
            font-weight: bold;
        }

        /* Стили для текста "since 2022" */
        .since-text {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: rgba(215, 215, 215, 1);
            transition: color 0.3s ease;
        }

        .since-text:hover {
            color: white;
        }

      /* Стили для текста "Social" */
        .social-link {
            position: fixed;
            bottom: 50px; /* Выше текста "since 2022" */
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.8rem;
            color: rgba(215, 215, 215, 1);
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease;
            width: max-content; /* Обеспечивает точный размер элемента */
            text-align: center; /* Текст будет оставаться по центру */
        }

        /* Анимация при наведении */
        .social-link:hover {
            color: #8A2BE2; /* Золотистый цвет */
            transform: scale(1.02) translateX(-49%); /* Центрируем и увеличиваем */
        }

        /* Изменение цвета при клике */
        .social-link:active {
            color: #00BFFF; /* Зеленый цвет */
            transform: scale(0.9) translateX(-56%);
        }

    </style>
</head>
