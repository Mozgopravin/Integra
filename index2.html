<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social link & gallery</title>
    <style>
        /* Подключаем шрифт Fatal (TRIAL) Bold */
        @font-face {
            font-family: 'Fatal Trial';  /* Имя шрифта */
            src: url('fonts/Fatal-TRIAL-Bold.woff2') format('woff2'),  /* Шрифт в формате woff2 */
                 url('fonts/Fatal-TRIAL-Bold.woff') format('woff'),  /* Шрифт в формате woff */
                 url('fonts/Fatal-TRIAL-Bold.ttf') format('truetype'); /* Шрифт в формате ttf */
            font-weight: bold;  /* Указываем, что это жирный шрифт */
            font-style: normal;  /* Устанавливаем стиль нормальный */
        }

        /* Общие стили */
        body {
            font-family: 'Fatal Trial', sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
            overflow-x: hidden;
        }

        /* Фоновые изображения и анимация */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://psv4.userapi.com/s/v1/d/_hCCRK_oRtH_dha0AD0_dAU4m5dUNGUpNI6Zv2znjrdN82pYqln64w_n9LVcKDPBfS3B7Dj0cdFGwvW7it0tBwRcKyFiFPzJvwZmkSrk-BgX3BqFOWe7EA/smyatenie.gif') no-repeat center center/cover;
            z-index: -1;
            filter: brightness(0.2); /* Затемнение фона */
        }

        /* Секция контактов */
        .contacts {
            padding: 50px 20px;
            text-align: center;
        }

        .contacts h2 {
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .contacts p {
            font-size: 1.2rem;
        }

        .social-links {
            margin-top: 20px;
        }

        .social-links a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
            font-size: 1.5rem;
        }

        .social-links a:hover {
            color: #ff0;
        }

        /* Секция галереи */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery-header {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: cover;
            transition: transform 0.3s ease-in-out;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        /* Надпись в верхнем левом углу */
        .main-label {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.5); /* Полупрозрачный фон */
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 10;
            text-decoration: none;
            transition: background-color 0.3s ease-in-out;
        }

        .main-label:hover {
            background-color: rgba(255, 255, 0, 0.4); /* Изменение фона при наведении */
        }
    </style>
</head>
<body>
    <!-- Надпись Main -->
    <a href="index.html" class="main-label">Main</a>

    <!-- Секция контактов -->
    <section class="contacts">
        <h2>Связь со мной</h2>
        <p>Мои контакты и соцсети:</p>
        <div class="social-links">
            <a href="https://www.vk.com" target="_blank">Vkontakte</a>
            <a href="https://www.youtube.com" target="_blank">YouTube</a>
            <a href="mailto:example@mail.com">Email</a>
        </div>
    </section>

    <!-- Секция галереи -->
    <section class="gallery">
        <h2 class="gallery-header">Галерея проектов</h2>
        <img src="https://sun7-19.userapi.com/impg/WXW5QRq_3-iLCUU0TFBzjuorxVF63jNPGSE-2A/ze2rQTJmHnI.jpg?size=563x751&quality=95&sign=cc991f9476aaef0c381203cc72c492c6&type=album" alt="Изображение 1">
        <img src="https://sun7-23.userapi.com/impg/djnQ2kk5DfxVu-txOXEd_luPcBu2VDWlzJExPA/MiZNhZXGaLI.jpg?size=866x819&quality=95&sign=039735817a7dfdc720567b3f373cb1f5&type=album" alt="Изображение 2">
        <img src="https://sun7-19.userapi.com/impg/UcsB_BShqa_Rnq1m10bbrWV23DTelh1-DFX_mQ/fZFcY-QxYh8.jpg?size=1170x882&quality=95&sign=6624d97272bd08e3a91cbab632cb4a1a&type=album" alt="Изображение 3">
        <img src="https://sun9-60.userapi.com/s/v1/ig2/hN8L_5caOBaByCe7K4-aNovLAbr8_wD09h5E8_a4fhJz-y5fAzi3UFU2wWjrNw0lp24OLvZ5J54bTUpkKlmfYBmz.jpg?quality=95&as=32x40,48x60,72x90,108x135,160x200,240x300,360x450,480x600,540x675,640x800,720x900,864x1080&from=bu&u=A8PHj_GG44FZfElyfOUHapzYJeP6PVOcxqqZZmwTQIs&cs=646x807" alt="Изображение 4">
    </section>
</body>
</html>
